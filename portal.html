<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal - Schuyler Realty</title>
<style>
:root{--kw-red:#CC0000;--kw-red-dark:#A30000;--kw-dark:#1a1a1a;--kw-gray:#4a4a4a;--kw-light:#f7f7f7;--kw-border:#e0e0e0;color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--kw-light);min-height:100vh;display:flex;flex-direction:column}
.site-header{background:var(--kw-dark);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.logo-mark{width:32px;height:32px;background:var(--kw-red);border-radius:5px;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:16px}
.logo-text .brand{color:white;font-size:15px;font-weight:700;display:block}
.logo-text .sub{color:#888;font-size:11px}
.header-right{display:flex;align-items:center;gap:16px}
.client-badge{background:rgba(255,255,255,0.1);border-radius:20px;padding:4px 12px;color:white;font-size:12px}
.logout-btn{background:none;border:1px solid #555;border-radius:6px;color:#aaa;padding:5px 12px;font-size:12px;cursor:pointer}
.logout-btn:hover{border-color:#999;color:white}
.property-bar{background:white;border-bottom:3px solid var(--kw-red);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.property-info h2{font-size:16px;color:var(--kw-dark);font-weight:700}
.property-info p{font-size:12px;color:var(--kw-gray);margin-top:1px}
.action-badge{background:#FFF3CD;border:1px solid #FBBF24;border-radius:6px;padding:6px 12px;font-size:12px;color:#92400E;font-weight:600;max-width:500px}
.tabs{background:white;border-bottom:1px solid var(--kw-border);display:flex;padding:0 12px;flex-shrink:0;overflow-x:auto}
.tab-btn{background:none;border:none;border-bottom:3px solid transparent;padding:14px 14px;font-size:13px;font-weight:600;color:var(--kw-gray);cursor:pointer;margin-bottom:-1px;white-space:nowrap}
.tab-btn:hover{color:var(--kw-dark)}
.tab-btn.active{color:var(--kw-red);border-bottom-color:var(--kw-red)}
.tab-panel{display:none;flex:1;flex-direction:column;min-height:0}
.tab-panel.active{display:flex}
.chat-container{display:flex;flex-direction:column;flex:1;min-height:0}
.chat-header{background:white;border-bottom:1px solid var(--kw-border);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.chat-header h3{font-size:14px;color:var(--kw-dark);font-weight:700}
.chat-header p{font-size:12px;color:var(--kw-gray)}
.quick-bar{background:#fafafa;border-bottom:1px solid var(--kw-border);padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.quick-label{font-size:11px;color:#999;font-weight:600;white-space:nowrap}
.quick-btn{background:white;border:1px solid var(--kw-border);border-radius:16px;padding:4px 11px;font-size:12px;color:var(--kw-gray);cursor:pointer}
.quick-btn:hover{border-color:var(--kw-red);color:var(--kw-red);background:#fff5f5}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.welcome-msg{background:#fff5f5;border:1px solid #FFCDD2;border-radius:12px;padding:16px 18px;max-width:560px}
.welcome-msg .wm-title{font-weight:700;color:var(--kw-red);margin-bottom:6px;font-size:14px}
.welcome-msg p{font-size:13px;color:var(--kw-gray);line-height:1.6}
.msg{display:flex;gap:8px;max-width:640px}
.msg.user{align-self:flex-end;flex-direction:row-reverse}
.msg-av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.msg.bot .msg-av{background:var(--kw-red);color:white}
.msg.user .msg-av{background:var(--kw-dark);color:white}
.msg-bubble{background:white;border:1px solid var(--kw-border);border-radius:12px;padding:10px 14px;font-size:13.5px;line-height:1.6;color:var(--kw-dark);max-width:calc(100% - 42px)}
.msg.user .msg-bubble{background:var(--kw-dark);color:white;border-color:var(--kw-dark)}
.msg-bubble strong{color:var(--kw-red)}
.typing{display:flex;align-items:center;gap:4px;padding:4px 0}
.typing span{width:6px;height:6px;background:#ccc;border-radius:50%;animation:bounce 1.2s infinite}
.typing span:nth-child(2){animation-delay:0.2s}
.typing span:nth-child(3){animation-delay:0.4s}
@keyframes bounce{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.chat-input-bar{background:white;border-top:1px solid var(--kw-border);padding:12px 16px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.chat-input-bar textarea{flex:1;border:1.5px solid var(--kw-border);border-radius:8px;padding:9px 13px;font-size:14px;font-family:inherit;resize:none;min-height:40px;max-height:100px;outline:none;color:var(--kw-dark)}
.chat-input-bar textarea:focus{border-color:var(--kw-red)}
.send-btn{background:var(--kw-red);color:white;border:none;border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.send-btn:hover{background:var(--kw-red-dark)}
.send-btn:disabled{background:#ccc;cursor:not-allowed}
.send-btn svg{width:17px;height:17px}
.chat-disclaimer{font-size:11px;color:#bbb;text-align:center;padding:4px 16px 8px;flex-shrink:0}
.scroll-panel{flex:1;overflow-y:auto;padding:20px}
.panel-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;max-width:900px}
.card{background:white;border:1px solid var(--kw-border);border-radius:12px;padding:18px}
.card h3{font-size:13px;font-weight:700;color:var(--kw-red);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px}
.row{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f0f0f0;gap:10px}
.row:last-child{border-bottom:none}
.rl{font-size:12px;color:var(--kw-gray);font-weight:600;flex-shrink:0;min-width:110px}
.rv{font-size:12px;color:var(--kw-dark);text-align:right}
.badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.b-done{background:#D1FAE5;color:#065F46}
.b-pending{background:#FEF3C7;color:#92400E}
.b-upcoming{background:#E0E7FF;color:#3730A3}
.b-ready{background:#DBEAFE;color:#1E40AF}
.b-signed{background:#D1FAE5;color:#065F46}
.contact-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;max-width:900px}
.contact-card{background:white;border:1px solid var(--kw-border);border-radius:10px;padding:16px;display:flex;gap:12px}
.cav{width:38px;height:38px;border-radius:50%;background:var(--kw-red);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.ci .role{font-size:11px;color:var(--kw-gray);text-transform:uppercase;font-weight:700}
.ci .cname{font-size:14px;font-weight:700;color:var(--kw-dark);margin:2px 0}
.ci a{font-size:12px;color:var(--kw-red);text-decoration:none;display:block}
.design-section{max-width:900px;margin-bottom:28px}
.design-section-title{font-size:13px;font-weight:700;color:var(--kw-red);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--kw-red)}
.design-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.design-card{background:white;border:1px solid var(--kw-border);border-radius:10px;overflow:hidden}
.design-swatch{height:80px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;text-align:center;padding:4px}
.design-icon{height:80px;display:flex;align-items:center;justify-content:center;background:#f8f8f8;font-size:13px;font-weight:600;color:var(--kw-gray)}
.dcb{padding:12px}
.dcb .dn{font-size:13px;font-weight:700;color:var(--kw-dark);margin-bottom:3px}
.dcb .dr{font-size:11px;color:var(--kw-red);font-weight:600;margin-bottom:6px}
.dcb .dd{font-size:11px;color:var(--kw-gray);margin-bottom:8px;line-height:1.4}
.view-btn{display:inline-block;background:var(--kw-red);color:white;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:700;text-decoration:none}
.view-btn:hover{background:var(--kw-red-dark)}
.info-note{font-size:11px;color:#888;font-style:italic}
.market-stat{text-align:center;padding:16px 8px}
.market-stat .num{font-size:28px;font-weight:900;color:var(--kw-red)}
.market-stat .lbl{font-size:11px;color:var(--kw-gray);text-transform:uppercase;font-weight:600;margin-top:4px}
.market-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:16px}
.net-total{background:var(--kw-red);color:white;border-radius:10px;padding:16px;text-align:center;margin-top:8px}
.net-total .nt-label{font-size:12px;opacity:0.85;margin-bottom:4px}
.net-total .nt-amount{font-size:28px;font-weight:900}
.kw-badge{background:#E0E7FF;color:#3730A3;border-radius:6px;padding:8px 12px;font-size:12px;margin-top:12px}
.site-footer{background:var(--kw-dark);color:#777;font-size:12px;text-align:center;padding:14px;flex-shrink:0}
.site-footer span{color:var(--kw-red)}
</style>
</head>
<body>
<header class="site-header">
  <a class="logo" href="index.html"><div class="logo-mark">SR</div><div class="logo-text"><span class="brand">Schuyler Realty</span><span class="sub">Client Portal</span></div></a>
  <div class="header-right"><div class="client-badge" id="clientBadge">Loading...</div><button class="logout-btn" onclick="logout()">Sign Out</button></div>
</header>
<div class="property-bar">
  <div class="property-info"><h2 id="propAddress">Loading...</h2><p id="propDetails">...</p></div>
  <div class="action-badge" id="actionBadge" style="display:none"></div>
</div>
<div class="tabs" id="tabBar"></div>
<div id="tabContent"></div>
<footer class="site-footer">2026 Schuyler Realty - <span>Keller Williams</span> Consultants Realty - Grove City, OH</footer>
<script src="clients-config.js"></script>
<script>
var code=sessionStorage.getItem('sr_client');
var client=CLIENTS[code];
if(!client){window.location.href='index.html';}
document.getElementById('clientBadge').textContent='Hi '+client.name;
document.getElementById('propAddress').textContent=client.property+(client.community?' - '+client.community:'');
var det=client.city;
if(client.type==='newconstruction')det+=(' - Builder: '+client.builder+' - Closing: '+client.closing_window);
if(client.type==='buyer')det+=(' - Closing: '+client.closing_date);
if(client.type==='seller')det+=(' - List Price: '+client.list_price);
document.getElementById('propDetails').textContent=det;
document.title=client.name+"'s Portal - Schuyler Realty";
if(client.action_item){var ab=document.getElementById('actionBadge');ab.textContent=client.action_item;ab.style.display='block';}

function fmt(n){return '$'+n.toLocaleString();}
function badge(s){var m={done:'b-done',pending:'b-pending',upcoming:'b-upcoming',ready:'b-ready',signed:'b-signed'};return '<span class="badge '+(m[s]||'b-upcoming')+'">'+s.charAt(0).toUpperCase()+s.slice(1)+'</span>';}
function milestonesHTML(){
  var ms=client.milestones||[];var h='';
  for(var i=0;i<ms.length;i++){
    var m=ms[i];var cls=m.status==='done'?'b-done':m.status==='pending'?'b-pending':'b-upcoming';
    var icon=m.status==='done'?'Complete':m.status==='pending'?'Action Needed':m.date;
    h+='<div class="row"><span class="rl">'+m.name+'</span><span class="rv"><span class="badge '+cls+'">'+icon+'</span></span></div>';
  }
  return h;
}
function contactsHTML(){
  var cs=client.contacts||[];var h='';
  for(var i=0;i<cs.length;i++){
    var c=cs[i];
    h+='<div class="contact-card"><div class="cav">'+c.initials+'</div><div class="ci"><div class="role">'+c.role+'</div><div class="cname">'+c.name+'</div>';
    if(c.phone&&c.phone!=='TBD'&&c.phone!=='')h+='<a href="tel:'+c.phone+'">'+c.phone+'</a>';
    if(c.email&&c.email!=='')h+='<a href="mailto:'+c.email+'">'+c.email+'</a>';
    h+='</div></div>';
  }
  return h;
}
function documentsHTML(){
  var ds=client.documents||[];var h='';
  for(var i=0;i<ds.length;i++){
    var d=ds[i];
    h+='<div class="row"><span class="rl">'+d.name+'</span><span class="rv" style="text-align:right">'+badge(d.status)+'<br><span style="font-size:10px;color:#999">'+d.note+'</span></span></div>';
  }
  return h;
}

var tabs=[];
var panels=[];

// ── NEW CONSTRUCTION ──────────────────────────────────────────────
if(client.type==='newconstruction'){
  tabs=['HOA Questions','Contract and Build','My Design Selections','My Summary','My Contacts'];

    // HOA
    '<div class="tab-panel" id="tab-0"><div class="chat-container"><div class="chat-header"><h3>HOA Questions</h3><p>Ask anything about your community rules</p></div><div class="quick-bar"><span class="quick-label">Try:</span><button class="quick-btn" onclick="askChat(0,'Can I have a bird feeder outside?')">Bird feeders?</button><button class="quick-btn" onclick="askChat(0,'What are the pet rules?')">Pet rules?</button><button class="quick-btn" onclick="askChat(0,'Can I install a hot tub?')">Hot tub?</button><button class="quick-btn" onclick="askChat(0,'What color do my blinds need to be?')">Window coverings?</button><button class="quick-btn" onclick="askChat(0,'When do I put my trash out?')">Trash rules?</button><button class="quick-btn" onclick="askChat(0,'Can I park my boat overnight?')">Parking?</button></div><div class="chat-messages" id="msgs-0"><div class="welcome-msg"><div class="wm-title">Hi! I know your HOA rules.</div><p>Ask me anything about your community in plain English.</p></div></div><div class="chat-input-bar"><textarea id="inp-0" placeholder="Ask about your HOA rules..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat(0)}" oninput="autoResize(this)"></textarea><button class="send-btn" id="btn-0" onclick="sendChat(0)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div><div class="chat-disclaimer">Based on your HOA document. Verify official rulings with your board.</div></div></div>',
    // Contract
    '<div class="tab-panel" id="tab-1"><div class="chat-container"><div class="chat-header"><h3>Contract and Build Questions</h3><p>Ask about selections, timeline, warranties, next steps</p></div><div class="quick-bar"><span class="quick-label">Try:</span><button class="quick-btn" onclick="askChat(1,'When is my closing date?')">Closing date?</button><button class="quick-btn" onclick="askChat(1,'What warranties do I have?')">Warranties?</button><button class="quick-btn" onclick="askChat(1,'What flooring did I choose?')">My flooring?</button><button class="quick-btn" onclick="askChat(1,'What appliances am I getting?')">Appliances?</button><button class="quick-btn" onclick="askChat(1,'What are my next steps?')">Next steps?</button></div><div class="chat-messages" id="msgs-1"><div class="welcome-msg"><div class="wm-title">Your contract and build details</div><p>Ask me about your design selections, timeline, or warranties.</p></div></div><div class="chat-input-bar"><textarea id="inp-1" placeholder="Ask about your contract or build..." rows="1" onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();sendChat(1)}" oninput="autoResize(this)"></textarea><button class="send-btn" id="btn-1" onclick="sendChat(1)"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div><div class="chat-disclaimer">Based on your contract summary. Verify with Epcon or your agent.</div></div></div>',

// Chat system
var chatContexts={};
function getChatSystem(idx){
  if(client.type==='newconstruction'){
    if(idx===0)return 'You are an HOA assistant for '+client.community+' in '+client.city+'. Help '+client.name+' understand their community rules.\n\nHOA Rules:\n'+client.hoa_rules+'\n\nAnswer clearly in plain English. Cite the section. Be concise.';
    return 'You are a real estate assistant helping '+client.name+' with their new home at '+client.property+'. Contract details:\n'+client.contract_notes+'\n\nAnswer clearly and concisely.';
  }
  if(client.type==='buyer'){
    if(idx===1)return 'You are an HOA assistant for '+client.community+' in '+client.city+'. Help '+client.name+' understand their community rules.\n\nHOA Rules:\n'+client.hoa_rules+'\n\nAnswer clearly in plain English. Cite the section. Be concise.';
    if(idx===3)return 'You are a neighborhood guide for '+client.city+'. Help '+client.name+' who is moving to '+client.property+'.\n\n'+client.contract_notes+'\n\nAnswer questions about schools, shopping, parks, and local amenities helpfully and concisely.';
    return 'You are a real estate assistant helping '+client.name+' with their purchase at '+client.property+'. Details:\n'+client.contract_notes+'\n\nAnswer clearly and concisely.';
  }
  if(client.type==='seller'){
    return 'You are a real estate assistant helping '+client.name+' sell their home at '+client.property+'. Listing details:\n'+client.contract_notes+'\n\nAnswer clearly and concisely.';
  }
  return 'You are a helpful real estate assistant.';
}
var loading={};
function autoResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,100)+'px';}
function askChat(idx,q){var inp=document.getElementById('inp-'+idx);if(inp){inp.value=q;sendChat(idx);}}
function addMsg(idx,text,type){
  var box=document.getElementById('msgs-'+idx);if(!box)return;
  var msg=document.createElement('div');msg.className='msg '+type;
  var av=document.createElement('div');av.className='msg-av';av.textContent=type==='bot'?'SR':client.name.charAt(0);
  var bub=document.createElement('div');bub.className='msg-bubble';
  if(type==='bot'){bub.innerHTML=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}
  else{bub.textContent=text;}
  msg.appendChild(av);msg.appendChild(bub);box.appendChild(msg);box.scrollTop=box.scrollHeight;
}
function addTyping(idx){
  var box=document.getElementById('msgs-'+idx);if(!box)return;
  var t=document.createElement('div');t.className='msg bot';t.id='typing-'+idx;
  t.innerHTML='<div class="msg-av">SR</div><div class="msg-bubble"><div class="typing"><span></span><span></span><span></span></div></div>';
  box.appendChild(t);box.scrollTop=box.scrollHeight;
}
function sendChat(idx){
  if(loading[idx])return;
  var inp=document.getElementById('inp-'+idx);if(!inp)return;
  var q=inp.value.trim();if(!q)return;
  loading[idx]=true;
  var btn=document.getElementById('btn-'+idx);if(btn)btn.disabled=true;
  inp.value='';inp.style.height='auto';
  var wm=document.querySelector('#msgs-'+idx+' .welcome-msg');if(wm)wm.remove();
  addMsg(idx,q,'user');addTyping(idx);
  fetch('/.netlify/functions/chat',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({system:getChatSystem(idx),messages:[{role:'user',content:q}]})})
    .then(function(r){return r.json();})
    .then(function(d){
      var t=document.getElementById('typing-'+idx);if(t)t.remove();
      addMsg(idx,d.content||'Sorry I could not get an answer. Please try again.','bot');
      loading[idx]=false;if(btn)btn.disabled=false;
    }).catch(function(){
      var t=document.getElementById('typing-'+idx);if(t)t.remove();
      addMsg(idx,'Something went wrong. Please try again.','bot');
      loading[idx]=false;if(btn)btn.disabled=false;
    });
}
function logout(){sessionStorage.removeItem('sr_client');window.location.href='index.html';}
