<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My Portal - Schuyler Realty</title>
<style>
:root{--r:#CC0000;--rd:#A30000;--dk:#1a1a1a;--gy:#4a4a4a;--lt:#f7f7f7;--br:#e0e0e0;color-scheme:light}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Arial,sans-serif;background:var(--lt);min-height:100vh;display:flex;flex-direction:column}
.hd{background:var(--dk);padding:0 20px;display:flex;align-items:center;justify-content:space-between;height:60px;flex-shrink:0}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none}
.lm{width:32px;height:32px;background:var(--r);border-radius:5px;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:16px}
.lt2 .br2{color:white;font-size:15px;font-weight:700;display:block}
.lt2 .sb{color:#888;font-size:11px}
.hr{display:flex;align-items:center;gap:16px}
.cb{background:rgba(255,255,255,0.1);border-radius:20px;padding:4px 12px;color:white;font-size:12px}
.lb{background:none;border:1px solid #555;border-radius:6px;color:#aaa;padding:5px 12px;font-size:12px;cursor:pointer}
.lb:hover{border-color:#999;color:white}
.pb{background:white;border-bottom:3px solid var(--r);padding:12px 20px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px}
.pb h2{font-size:16px;color:var(--dk);font-weight:700}
.pb p{font-size:12px;color:var(--gy);margin-top:1px}
.ab{background:#FFF3CD;border:1px solid #FBBF24;border-radius:6px;padding:6px 12px;font-size:12px;color:#92400E;font-weight:600;max-width:500px}
.tabs{background:white;border-bottom:1px solid var(--br);display:flex;padding:0 12px;flex-shrink:0;overflow-x:auto}
.tb{background:none;border:none;border-bottom:3px solid transparent;padding:14px 14px;font-size:13px;font-weight:600;color:var(--gy);cursor:pointer;margin-bottom:-1px;white-space:nowrap}
.tb:hover{color:var(--dk)}
.tb.act{color:var(--r);border-bottom-color:var(--r)}
.tp{display:none;flex:1;flex-direction:column;min-height:0}
.tp.act{display:flex}
.cc{display:flex;flex-direction:column;flex:1;min-height:0}
.ch{background:white;border-bottom:1px solid var(--br);padding:10px 20px;display:flex;align-items:center;gap:10px;flex-shrink:0}
.ch h3{font-size:14px;color:var(--dk);font-weight:700}
.ch p{font-size:12px;color:var(--gy)}
.qb{background:#fafafa;border-bottom:1px solid var(--br);padding:8px 16px;display:flex;gap:6px;flex-wrap:wrap;align-items:center;flex-shrink:0}
.ql{font-size:11px;color:#999;font-weight:600;white-space:nowrap}
.qbtn{background:white;border:1px solid var(--br);border-radius:16px;padding:4px 11px;font-size:12px;color:var(--gy);cursor:pointer}
.qbtn:hover{border-color:var(--r);color:var(--r);background:#fff5f5}
.cm{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.wm{background:#fff5f5;border:1px solid #FFCDD2;border-radius:12px;padding:16px 18px;max-width:560px}
.wm .wt{font-weight:700;color:var(--r);margin-bottom:6px;font-size:14px}
.wm p{font-size:13px;color:var(--gy);line-height:1.6}
.msg{display:flex;gap:8px;max-width:640px}
.msg.u{align-self:flex-end;flex-direction:row-reverse}
.av{width:30px;height:30px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0;margin-top:2px}
.msg.b .av{background:var(--r);color:white}
.msg.u .av{background:var(--dk);color:white}
.bl{background:white;border:1px solid var(--br);border-radius:12px;padding:10px 14px;font-size:13.5px;line-height:1.6;color:var(--dk);max-width:calc(100% - 42px)}
.msg.u .bl{background:var(--dk);color:white;border-color:var(--dk)}
.bl strong{color:var(--r)}
.ty{display:flex;align-items:center;gap:4px;padding:4px 0}
.ty span{width:6px;height:6px;background:#ccc;border-radius:50%;animation:bn 1.2s infinite}
.ty span:nth-child(2){animation-delay:.2s}
.ty span:nth-child(3){animation-delay:.4s}
@keyframes bn{0%,60%,100%{transform:translateY(0)}30%{transform:translateY(-5px)}}
.ci{background:white;border-top:1px solid var(--br);padding:12px 16px;display:flex;gap:8px;align-items:flex-end;flex-shrink:0}
.ci textarea{flex:1;border:1.5px solid var(--br);border-radius:8px;padding:9px 13px;font-size:14px;font-family:inherit;resize:none;min-height:40px;max-height:100px;outline:none;color:var(--dk)}
.ci textarea:focus{border-color:var(--r)}
.sb2{background:var(--r);color:white;border:none;border-radius:8px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}
.sb2:hover{background:var(--rd)}
.sb2:disabled{background:#ccc;cursor:not-allowed}
.sb2 svg{width:17px;height:17px}
.dc{font-size:11px;color:#bbb;text-align:center;padding:4px 16px 8px;flex-shrink:0}
.sp{flex:1;overflow-y:auto;padding:20px}
.pg{display:grid;grid-template-columns:repeat(auto-fit,minmax(280px,1fr));gap:16px;max-width:900px}
.cd{background:white;border:1px solid var(--br);border-radius:12px;padding:18px}
.cd h3{font-size:13px;font-weight:700;color:var(--r);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px}
.rw{display:flex;justify-content:space-between;align-items:flex-start;padding:6px 0;border-bottom:1px solid #f0f0f0;gap:10px}
.rw:last-child{border-bottom:none}
.rl{font-size:12px;color:var(--gy);font-weight:600;flex-shrink:0;min-width:110px}
.rv{font-size:12px;color:var(--dk);text-align:right}
.bge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:11px;font-weight:700}
.bd{background:#D1FAE5;color:#065F46}
.bp{background:#FEF3C7;color:#92400E}
.bu{background:#E0E7FF;color:#3730A3}
.br3{background:#DBEAFE;color:#1E40AF}
.bs{background:#D1FAE5;color:#065F46}
.cg{display:grid;grid-template-columns:repeat(auto-fill,minmax(240px,1fr));gap:14px;max-width:900px}
.cc2{background:white;border:1px solid var(--br);border-radius:10px;padding:16px;display:flex;gap:12px}
.ca{width:38px;height:38px;border-radius:50%;background:var(--r);color:white;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.ci2 .ro{font-size:11px;color:var(--gy);text-transform:uppercase;font-weight:700}
.ci2 .cn{font-size:14px;font-weight:700;color:var(--dk);margin:2px 0}
.ci2 a{font-size:12px;color:var(--r);text-decoration:none;display:block}
.ds{max-width:900px;margin-bottom:28px}
.dt{font-size:13px;font-weight:700;color:var(--r);text-transform:uppercase;letter-spacing:.5px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--r)}
.dg{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:12px}
.dc2{background:white;border:1px solid var(--br);border-radius:10px;overflow:hidden}
.dsw{height:80px;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:600;text-align:center;padding:4px}
.dic{height:80px;display:flex;align-items:center;justify-content:center;background:#f8f8f8;font-size:13px;font-weight:600;color:var(--gy)}
.db{padding:12px}
.db .dn{font-size:13px;font-weight:700;color:var(--dk);margin-bottom:3px}
.db .dr{font-size:11px;color:var(--r);font-weight:600;margin-bottom:6px}
.db .dd{font-size:11px;color:var(--gy);margin-bottom:8px;line-height:1.4}
.vb{display:inline-block;background:var(--r);color:white;border-radius:5px;padding:5px 10px;font-size:11px;font-weight:700;text-decoration:none}
.vb:hover{background:var(--rd)}
.inf{font-size:11px;color:#888;font-style:italic}
.ms{text-align:center;padding:16px 8px}
.ms .mn{font-size:28px;font-weight:900;color:var(--r)}
.ms .ml{font-size:11px;color:var(--gy);text-transform:uppercase;font-weight:600;margin-top:4px}
.mg{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:12px;margin-bottom:16px}
.nt{background:var(--r);color:white;border-radius:10px;padding:16px;text-align:center;margin-top:8px}
.nt .nl{font-size:12px;opacity:.85;margin-bottom:4px}
.nt .na{font-size:28px;font-weight:900}
.kb{background:#E0E7FF;color:#3730A3;border-radius:6px;padding:8px 12px;font-size:12px;margin-top:12px}
.ft{background:var(--dk);color:#777;font-size:12px;text-align:center;padding:14px;flex-shrink:0}
.ft span{color:var(--r)}
</style>
</head>
<body>
<header class="hd">
  <a class="logo" href="index.html"><div class="lm">SR</div><div class="lt2"><span class="br2">Schuyler Realty</span><span class="sb">Client Portal</span></div></a>
  <div class="hr"><div class="cb" id="cBadge">Loading...</div><button class="lb" onclick="logout()">Sign Out</button></div>
</header>
<div class="pb">
  <div><h2 id="pAddr">Loading...</h2><p id="pDet">...</p></div>
  <div class="ab" id="aBtn" style="display:none"></div>
</div>
<div class="tabs" id="tabBar"></div>
<div id="tabContent"></div>
<footer class="ft">2026 Schuyler Realty - <span>Keller Williams</span> Consultants Realty - Grove City, OH</footer>

<script src="clients-config.js"></script>
<script>
var code=sessionStorage.getItem('sr_client');
var client=CLIENTS[code];
if(!client){window.location.href='index.html';}

document.getElementById('cBadge').textContent='Hi '+client.name;
document.getElementById('pAddr').textContent=client.property+(client.community?' - '+client.community:'');
var det=client.city;
if(client.type==='newconstruction')det+=' - Builder: '+client.builder+' - Closing: '+client.closing_window;
else if(client.type==='buyer')det+=' - Closing: '+client.closing_date;
else if(client.type==='seller')det+=' - List Price: '+client.list_price;
document.getElementById('pDet').textContent=det;
document.title=client.name+"'s Portal - Schuyler Realty";
if(client.action_item){var ab=document.getElementById('aBtn');ab.textContent=client.action_item;ab.style.display='block';}

// Quick questions stored as arrays - no quote nesting issues
var QUICK={
  hoa:["Can I have a bird feeder outside?","What are the pet rules?","Can I install a hot tub?","What color do my blinds need to be?","When do I put my trash out?","Can I park my boat overnight?"],
  contract:["When is my closing date?","What warranties do I have?","What flooring did I choose?","What appliances am I getting?","What are my next steps?"],
  buyer_hoa:["What are the pet rules?","Can I park a boat or RV?","Can I put up a fence?","What are the rental rules?"],
  neighbor:["What school district am I in?","What grocery stores are nearby?","What parks are close by?","What restaurants are nearby?"],
  seller:["How many showings have I had?","What feedback have buyers given?","What is my estimated net at closing?","What are my next steps?"]
};

function fmt(n){return '$'+Math.round(n).toLocaleString();}
function badge(s,label){
  var m={done:'bd',pending:'bp',upcoming:'bu',ready:'br3',signed:'bs'};
  var l=label||(s.charAt(0).toUpperCase()+s.slice(1));
  return '<span class="bge '+(m[s]||'bu')+'">'+l+'</span>';
}
function milestonesHtml(){
  var ms=client.milestones||[];var h='';
  for(var i=0;i<ms.length;i++){
    var m=ms[i];
    var lbl=m.status==='done'?'Complete':m.status==='pending'?'Action Needed':m.date;
    h+='<div class="rw"><span class="rl">'+m.name+'</span><span class="rv">'+badge(m.status,lbl)+'</span></div>';
  }
  return h;
}
function contactsHtml(){
  var cs=client.contacts||[];var h='';
  for(var i=0;i<cs.length;i++){
    var c=cs[i];
    h+='<div class="cc2"><div class="ca">'+c.initials+'</div><div class="ci2"><div class="ro">'+c.role+'</div><div class="cn">'+c.name+'</div>';
    if(c.phone&&c.phone!=='TBD'&&c.phone)h+='<a href="tel:'+c.phone+'">'+c.phone+'</a>';
    if(c.email&&c.email)h+='<a href="mailto:'+c.email+'">'+c.email+'</a>';
    h+='</div></div>';
  }
  return h;
}
function docsHtml(){
  var ds=client.documents||[];var h='';
  for(var i=0;i<ds.length;i++){
    var d=ds[i];
    h+='<div class="rw"><span class="rl">'+d.name+'</span><span class="rv">'+badge(d.status)+'<br><span style="font-size:10px;color:#999">'+d.note+'</span></span></div>';
  }
  return h;
}
function qBar(qKey,chatIdx){
  var qs=QUICK[qKey]||[];
  var h='<div class="qb"><span class="ql">Try:</span>';
  for(var i=0;i<qs.length;i++){
    h+='<button class="qbtn" data-ci="'+chatIdx+'" data-qi="'+i+'">'+qs[i]+'</button>';
  }
  return h+'</div>';
}
function chatPanel(id,title,sub,qKey,ph,disc){
  return '<div class="tp" id="tp'+id+'"><div class="cc">'+
    '<div class="ch"><h3>'+title+'</h3><p>'+sub+'</p></div>'+
    qBar(qKey,id)+
    '<div class="cm" id="ms'+id+'"><div class="wm"><div class="wt">'+title+'</div><p>'+sub+'</p></div></div>'+
    '<div class="ci"><textarea id="in'+id+'" placeholder="'+ph+'" rows="1" onkeydown="ckEnter(event,'+id+')"></textarea>'+
    '<button class="sb2" id="snd'+id+'" onclick="sendC('+id+')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg></button></div>'+
    '<div class="dc">'+disc+'</div>'+
    '</div></div>';
}

var tabs=[];var panels=[];

if(client.type==='newconstruction'){
  tabs=['HOA Questions','Contract & Build','Design Selections','My Summary','My Contacts'];
  panels=[
    chatPanel(0,'HOA Questions','Ask anything about your community rules','hoa','Ask about your HOA rules...','Based on your HOA document. Verify rulings with your board.'),
    chatPanel(1,'Contract & Build','Ask about selections, timeline, warranties','contract','Ask about your contract or build...','Based on your contract summary. Verify with Epcon or your agent.'),
    // Design tab
    '<div class="tp" id="tp2"><div class="sp">'+
    '<div class="ds"><div class="dt">Paint Colors</div><div class="dg">'+
    '<div class="dc2"><div class="dsw" style="background:#D1CBC1;color:#5a5046">Agreeable Gray</div><div class="db"><div class="dn">Agreeable Gray SW7029</div><div class="dr">Interior Walls</div><div class="dd">Warm greige - SW most popular neutral.</div><a class="vb" href="https://www.sherwin-williams.com/en-us/color/color-family/neutral-paint-colors/sw7029-agreeable-gray" target="_blank">View Color</a></div></div>'+
    '<div class="dc2"><div class="dsw" style="background:#64696C;color:#fff">Web Gray</div><div class="db"><div class="dn">Web Gray SW7075</div><div class="dr">Front Door</div><div class="dd">Deep gray with cool blue undertones.</div><a class="vb" href="https://www.sherwin-williams.com/en-us/color/color-family/neutral-paint-colors/sw7075-web-gray" target="_blank">View Color</a></div></div>'+
    '<div class="dc2"><div class="dsw" style="background:#6B7075;color:#fff">Online SW7072</div><div class="db"><div class="dn">Online SW7072</div><div class="dr">Exterior Primary Siding</div><div class="dd">CFN-7 Hillsborough palette - LP SmartSide.</div><a class="vb" href="https://www.sherwin-williams.com/en-us/color/color-family/neutral-paint-colors/sw7072-online" target="_blank">View Color</a></div></div>'+
    '<div class="dc2"><div class="dsw" style="background:#787E7A;color:#fff">Software SW7074</div><div class="db"><div class="dn">Software SW7074</div><div class="dr">Exterior Secondary Siding</div><div class="dd">CFN-7 Hillsborough accent color.</div><a class="vb" href="https://www.sherwin-williams.com/en-us/color/color-family/neutral-paint-colors/sw7074-software" target="_blank">View Color</a></div></div>'+
    '<div class="dc2"><div class="dsw" style="background:#F4EEE8;color:#888">Pure White SW7005</div><div class="db"><div class="dn">Pure White SW7005</div><div class="dr">Exterior Trim</div><div class="dd">Clean white for all trim and louvers.</div><a class="vb" href="https://www.sherwin-williams.com/en-us/color/color-family/white-paint-colors/sw7005-pure-white" target="_blank">View Color</a></div></div>'+
    '</div></div>'+
    '<div class="ds"><div class="dt">Flooring</div><div class="dg">'+
    '<div class="dc2"><div class="dic">Laminate Plank</div><div class="db"><div class="dn">Knotted Chestnut</div><div class="dr">Living, Dining, Kitchen, Foyer, Den, Mudroom</div><div class="dd">Mohawk Rustic Moor 7.5 inch - Level 1 Laminate.</div><a class="vb" href="https://www.floorcity.com/products/mohawk-revwood-select-rare-vintage-knotted-chestnut-cdl74-03w" target="_blank">View Product</a></div></div>'+
    '<div class="dc2"><div class="dic">Carpet</div><div class="db"><div class="dn">Country Walk Aurora</div><div class="dr">Master and Guest Bedrooms</div><div class="dd">Mohawk Level 4 carpet with 8lb pad.</div><div class="inf">Builder-exclusive - contact Kelli Joyce at Epcon for samples</div></div></div>'+
    '<div class="dc2"><div class="dic">Shower Tile</div><div class="db"><div class="dn">Tuscan Villa - Arezzo Ivory</div><div class="dr">Master Shower Floor and Walls</div><div class="dd">Florida Tile 12x12 - Bleached Wood grout. Tile to ceiling.</div><a class="vb" href="https://www.floridatile.com/products/tuscan-villa/" target="_blank">View Product</a></div></div>'+
    '<div class="dc2"><div class="dic">Bath Tile</div><div class="db"><div class="dn">CF Prime Balans - White</div><div class="dr">Guest Bathroom</div><div class="dd">Daltile 12x12 White, Ash grout. Wall tile to ceiling.</div><a class="vb" href="https://www.daltile.com/products/stone-look/prime/white" target="_blank">View Product</a></div></div>'+
    '</div></div>'+
    '<div class="ds"><div class="dt">Countertops</div><div class="dg">'+
    '<div class="dc2"><div class="dic">Kitchen Quartz</div><div class="db"><div class="dn">Calacatta Prado</div><div class="dr">Kitchen</div><div class="dd">Level 2 Quartz by MSI. White with gray and gold veining.</div><a class="vb" href="https://www.msisurfaces.com/quartz-countertops/calacatta-prado-quartz/" target="_blank">View Product</a></div></div>'+
    '<div class="dc2"><div class="dic">Bath Quartz</div><div class="db"><div class="dn">Carrara Breve</div><div class="dr">Master and Guest Baths</div><div class="dd">Level 1 Quartz by MSI. Classic Carrara marble look.</div><a class="vb" href="https://www.msisurfaces.com/quartz-countertops/carrara-breve-quartz/" target="_blank">View Product</a></div></div>'+
    '</div></div>'+
    '<div class="ds"><div class="dt">Kitchen Backsplash</div><div class="dg">'+
    '<div class="dc2"><div class="dsw" style="background:#5B7A61;color:#fff">Envy Green</div><div class="db"><div class="dn">Emotive - Envy Green</div><div class="dr">Kitchen Backsplash</div><div class="dd">Florida Tile 3x12. Snow White grout, 1/2 offset install.</div><a class="vb" href="https://www.floridatile.com/products/emotive/" target="_blank">View Product</a></div></div>'+
    '</div></div>'+
    '<div class="ds"><div class="dt">GE Appliances - Stainless Suite</div><div class="dg">'+
    '<div class="dc2"><div class="dic">Refrigerator</div><div class="db"><div class="dn">GFE26JYMFS</div><div class="dr">Kitchen</div><div class="dd">GE French Door - Stainless steel.</div><a class="vb" href="https://www.geappliances.com/appliance/GE-ENERGY-STAR-27-0-Cu-Ft-French-Door-Refrigerator-GFE26JYMFS" target="_blank">View Product</a></div></div>'+
    '<div class="dc2"><div class="dic">Dishwasher</div><div class="db"><div class="dn">GDT670SYVFS</div><div class="dr">Kitchen</div><div class="dd">GE ENERGY STAR Top Control with Sanitize Cycle.</div><a class="vb" href="https://www.geappliances.com/appliance/GE-ENERGY-STAR-Top-Control-with-Stainless-Steel-Interior-Dishwasher-with-Sanitize-Cycle-GDT670SYVFS" target="_blank">View Product</a></div></div>'+
    '<div class="dc2"><div class="dic">Gas Cooktop</div><div class="db"><div class="dn">CGP70302NS1</div><div class="dr">Kitchen</div><div class="dd">Cafe 30 inch Gas - 5 sealed burners.</div><a class="vb" href="https://www.cafeappliances.com/appliance/CAFE-30-Gas-Cooktop-CGP70302NS1" target="_blank">View Product</a></div></div>'+
    '<div class="dc2"><div class="dic">Wall Oven</div><div class="db"><div class="dn">PT7800SHSS</div><div class="dr">Kitchen</div><div class="dd">GE Profile Double Wall Oven - Convection combo.</div><a class="vb" href="https://www.geappliances.com/appliance/GE-Profile-30-Smart-Built-In-Convection-Double-Wall-Oven-PT7800SHSS" target="_blank">View Product</a></div></div>'+
    '</div></div>'+
    '</div></div>',
    // Summary
    '<div class="tp" id="tp3"><div class="sp"><div class="pg">'+
    '<div class="cd"><h3>Your Property</h3><div class="rw"><span class="rl">Address</span><span class="rv">'+client.property+'</span></div><div class="rw"><span class="rl">Community</span><span class="rv">'+client.community+'</span></div><div class="rw"><span class="rl">City</span><span class="rv">'+client.city+'</span></div><div class="rw"><span class="rl">Builder</span><span class="rv">'+client.builder+'</span></div><div class="rw"><span class="rl">Closing</span><span class="rv">'+client.closing_window+'</span></div></div>'+
    '<div class="cd"><h3>Build Milestones</h3>'+milestonesHtml()+'</div>'+

else if(client.type==='buyer'){

    '<div class="cd"><h3>Reminders</h3><div class="rw"><span class="rl">Wire Fraud</span><span class="rv" style="color:#CC0000;font-weight:600">Never wire funds by email. Always call first.</span></div><div class="rw"><span class="rl">Utilities</span><span class="rv">Schedule transfer for closing day</span></div><div class="rw"><span class="rl">Insurance</span><span class="rv">Homeowners policy required before closing</span></div></div>'+

    '<div class="cd" style="background:#F0F9FF;border-color:#BAE6FD"><h3 style="color:#0369A1">DocuSign Coming Soon</h3><div style="font-size:13px;color:#0c4a6e;line-height:1.6">Your documents will be viewable and signable directly here once DocuSign is connected.</div></div>'+
    '</div></div></div>',

    '<div class="tp" id="tp4"><div class="sp"><div class="cg">'+contactsHtml()+'</div></div></div>'
  ];
}
else if(client.type==='seller'){
  var ns=client.net_sheet||{};
  var sp=ns.estimated_sale_price||0;
  var comm=Math.round(sp*(ns.agent_commission||0.06));
  var tt=Math.round(sp*(ns.transfer_tax||0.004));
  var total=comm+tt+(ns.title_fees||0)+(ns.home_warranty||0)+(ns.misc_closing||0);
  var net=sp-(ns.mortgage_payoff||0)-total;
  var ma=client.market_activity||{};
  tabs=['Listing Timeline','Market Activity','My Documents','Net Sheet','My Contacts'];
  panels=[
    '<div class="tp" id="tp0"><div class="sp"><div class="pg">'+
    '<div class="cd"><h3>Listing Milestones</h3>'+milestonesHtml()+'</div>'+
    '<div class="cd"><h3>Listing Details</h3><div class="rw"><span class="rl">Property</span><span class="rv">'+client.property+'</span></div><div class="rw"><span class="rl">List Price</span><span class="rv" style="color:var(--r);font-weight:700">'+client.list_price+'</span></div></div>'+
    '</div></div></div>',
    '<div class="tp" id="tp1"><div class="sp"><div class="mg">'+
    '<div class="cd ms"><div class="mn">'+ma.days_on_market+'</div><div class="ml">Days on Market</div></div>'+
    '<div class="cd ms"><div class="mn">'+ma.showings+'</div><div class="ml">Showings</div></div>'+
    '<div class="cd ms"><div class="mn">'+ma.open_house_visitors+'</div><div class="ml">Open House Visitors</div></div>'+
    '<div class="cd ms"><div class="mn">'+ma.online_views+'</div><div class="ml">Online Views</div></div>'+
    '<div class="cd ms"><div class="mn">'+ma.saves+'</div><div class="ml">Saves</div></div>'+
    '</div><div class="cd" style="max-width:900px;margin-bottom:16px"><h3>Buyer Feedback</h3><div style="font-size:14px;color:#374151;line-height:1.7;padding:4px 0">'+ma.feedback_summary+'</div></div>'+
    '<div class="kb">KW Command Integration Coming Soon - Showings and feedback will sync automatically.</div>'+
    '</div></div>',
    '<div class="tp" id="tp2"><div class="sp"><div class="pg">'+
    '<div class="cd"><h3>Your Documents</h3>'+docsHtml()+'</div>'+
    '<div class="cd" style="background:#F0F9FF;border-color:#BAE6FD"><h3 style="color:#0369A1">DocuSign Coming Soon</h3><div style="font-size:13px;color:#0c4a6e;line-height:1.6">All listing documents and offers will be accessible and signable here once DocuSign is connected.</div></div>'+
    '</div></div></div>',
    '<div class="tp" id="tp3"><div class="sp"><div class="pg">'+
    '<div class="cd"><h3>Estimated Net Sheet</h3>'+

// Render
var tabBar=document.getElementById('tabBar');
var tc=document.getElementById('tabContent');
tabs.forEach(function(t,i){
  var b=document.createElement('button');
  b.className='tb'+(i===0?' act':'');
  b.textContent=t;
  b.setAttribute('data-i',i);
  b.onclick=function(){
    var idx=parseInt(this.getAttribute('data-i'));
    document.querySelectorAll('.tb').forEach(function(x){x.classList.remove('act');});
    document.querySelectorAll('.tp').forEach(function(x){x.classList.remove('act');});
    this.classList.add('act');
    var tp=document.getElementById('tp'+idx);
    if(tp)tp.classList.add('act');
  };
  tabBar.appendChild(b);
});
tc.innerHTML=panels.join('');
var first=document.getElementById('tp0');
if(first)first.classList.add('act');

// Quick button event delegation - no inline onclick strings
document.addEventListener('click',function(e){
  if(e.target.classList.contains('qbtn')){
    var ci=parseInt(e.target.getAttribute('data-ci'));
    var qi=parseInt(e.target.getAttribute('data-qi'));
    var qKey=null;
    if(client.type==='newconstruction'){qKey=ci===0?'hoa':'contract';}
    else if(client.type==='buyer'){qKey=ci===1?'buyer_hoa':ci===3?'neighbor':'hoa';}
    else if(client.type==='seller'){qKey='seller';}
    if(qKey&&QUICK[qKey]&&QUICK[qKey][qi]){
      var inp=document.getElementById('in'+ci);
      if(inp){inp.value=QUICK[qKey][qi];sendC(ci);}
    }
  }
});

// Chat
var ld={};
function ckEnter(e,i){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendC(i);}}
function addM(i,text,type){
  var box=document.getElementById('ms'+i);if(!box)return;
  var m=document.createElement('div');m.className='msg '+(type==='bot'?'b':'u');
  var av=document.createElement('div');av.className='av';av.textContent=type==='bot'?'SR':client.name.charAt(0);
  var bl=document.createElement('div');bl.className='bl';
  if(type==='bot'){bl.innerHTML=text.replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>').replace(/\n/g,'<br>');}
  else{bl.textContent=text;}
  m.appendChild(av);m.appendChild(bl);box.appendChild(m);box.scrollTop=box.scrollHeight;
}
function addTy(i){
  var box=document.getElementById('ms'+i);if(!box)return;
  var t=document.createElement('div');t.className='msg b';t.id='ty'+i;
  t.innerHTML='<div class="av">SR</div><div class="bl"><div class="ty"><span></span><span></span><span></span></div></div>';
  box.appendChild(t);box.scrollTop=box.scrollHeight;
}
function getSys(i){
  if(client.type==='newconstruction'){
    if(i===0)return 'You are an HOA assistant for '+client.community+' in '+client.city+'. Help '+client.name+' understand their community rules. HOA Rules:\n'+client.hoa_rules+'\nAnswer clearly in plain English. Cite the section. Keep answers concise.';
    return 'You are a real estate assistant helping '+client.name+' with their new home at '+client.property+'. Contract details:\n'+client.contract_notes+'\nAnswer clearly and concisely.';
  }
  if(client.type==='buyer'){
    if(i===1)return 'You are an HOA assistant for '+client.community+' in '+client.city+'. Help '+client.name+'. HOA Rules:\n'+client.hoa_rules+'\nAnswer clearly and concisely.';
    if(i===3)return 'You are a neighborhood guide for '+client.city+'. Help '+client.name+' who is moving to '+client.property+'. Details:\n'+client.contract_notes+'\nAnswer helpfully about schools, shopping, parks, and amenities.';
    return 'You are a real estate assistant helping '+client.name+' with their purchase at '+client.property+'. Details:\n'+client.contract_notes+'\nAnswer clearly and concisely.';
  }
  if(client.type==='seller'){
    return 'You are a real estate assistant helping '+client.name+' sell '+client.property+'. Details:\n'+client.contract_notes+'\nAnswer clearly and concisely.';
  }
  return 'You are a helpful real estate assistant for Schuyler Realty.';
}
function sendC(i){
  if(ld[i])return;
  var inp=document.getElementById('in'+i);if(!inp)return;
  var q=inp.value.trim();if(!q)return;
  ld[i]=true;
  var btn=document.getElementById('snd'+i);if(btn)btn.disabled=true;
  inp.value='';
  var wm=document.querySelector('#ms'+i+' .wm');if(wm)wm.remove();
  addM(i,q,'user');addTy(i);
  fetch('/.netlify/functions/chat',{method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({system:getSys(i),messages:[{role:'user',content:q}]})})
  .then(function(r){return r.json();})
  .then(function(d){
    var t=document.getElementById('ty'+i);if(t)t.remove();
    addM(i,d.content||'Sorry, could not get an answer. Please try again.','bot');
    ld[i]=false;if(btn)btn.disabled=false;
  }).catch(function(){
    var t=document.getElementById('ty'+i);if(t)t.remove();
    addM(i,'Something went wrong. Please try again.','bot');
    ld[i]=false;if(btn)btn.disabled=false;
  });
}
function logout(){sessionStorage.removeItem('sr_client');window.location.href='index.html';}
</script>
